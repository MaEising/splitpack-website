<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Seite nicht gefunden - SplitPack</title>
    <meta name="description" content="Die angeforderte SplitPack-Seite wurde nicht gefunden.">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-white text-slate-950 antialiased">
    <main class="mx-auto flex min-h-screen w-full max-w-3xl flex-col items-start justify-center px-6 py-12">
      <p class="mb-3 text-sm font-bold uppercase tracking-wide text-orange-600">404</p>
      <h1 class="text-4xl font-black tracking-tight">Seite nicht gefunden</h1>
      <p class="mt-4 max-w-xl text-lg leading-8 text-slate-600">
        Die angeforderte Seite existiert nicht oder wurde verschoben.
      </p>
      <a class="mt-8 rounded-full bg-orange-500 px-5 py-3 text-sm font-bold text-white transition hover:bg-orange-600" href="/">
        Zur Startseite
      </a>
    </main>
  </body>
</html>
