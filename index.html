<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SplitPack Invite Links</title>
    <meta
      name="description"
      content="SplitPack Invite Links fuer Trips."
    />
    <script>
      (() => {
        const kegelChefHosts = new Set([
          "kegelchef.splitpack.de",
          "kegelchef.splitpack.info",
          "kegelchef.splitpack.online",
        ]);

        if (kegelChefHosts.has(window.location.hostname)) {
          window.location.replace("/kegelchef/");
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
        --bg: #fffaf4;
        --card: #ffffff;
        --ink: #172033;
        --muted: #64748b;
        --line: #fed7aa;
        --accent: #f97316;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(251, 191, 36, 0.18), transparent 34rem),
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 20px;
      }

      .panel {
        width: min(100%, 480px);
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.1);
        padding: 32px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .mark {
        display: inline-grid;
        width: 48px;
        height: 48px;
        flex: 0 0 auto;
        place-items: center;
        border-radius: 14px;
        background: linear-gradient(135deg, #fb923c, #f59e0b);
        color: #ffffff;
        font-size: 24px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 2rem;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      code {
        border-radius: 8px;
        background: #ffedd5;
        color: #9a3412;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          monospace;
        font-size: 0.92em;
        padding: 2px 6px;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-top: 24px;
      }

      .links a {
        color: var(--accent);
        font-size: 0.95rem;
        font-weight: 700;
        text-decoration: none;
      }

      .links a:hover {
        text-decoration: underline;
        text-underline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-labelledby="title">
        <div class="brand">
          <div class="mark" aria-hidden="true">S</div>
          <h1 id="title">SplitPack</h1>
        </div>
        <p>
          Diese Domain verarbeitet SplitPack Invite Links. Einladungen nutzen das Format
          <code>/join/&lt;tripId&gt;</code>.
        </p>
        <nav class="links" aria-label="Rechtliches">
          <a href="datenschutz.html">Datenschutz</a>
          <a href="impressum.html">Impressum</a>
        </nav>
      </section>
    </main>
  </body>
</html>
