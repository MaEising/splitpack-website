<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KegelChef</title>
    <meta name="description" content="Rechtliche Informationen zur KegelChef App." />
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f5ef;
        --card: #ffffff;
        --ink: #1f1a14;
        --muted: #6f665d;
        --line: #d9cfc0;
        --accent: #d8841d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      main {
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 20px;
      }

      .panel {
        width: min(100%, 480px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        padding: 32px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 7vw, 2.75rem);
        letter-spacing: 0;
        line-height: 1.05;
      }

      p {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-top: 24px;
      }

      a {
        color: var(--accent);
        font-weight: 700;
        text-underline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-labelledby="title">
        <h1 id="title">KegelChef</h1>
        <p>Rechtliche Informationen zur KegelChef App.</p>
        <nav aria-label="Rechtliches">
          <a href="./datenschutz.html">Datenschutz</a>
          <a href="./privacy.html">Privacy Policy</a>
          <a href="./impressum.html">Impressum</a>
        </nav>
      </section>
    </main>
  </body>
</html>
